<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ED-OPS expertise — Domains of operation in network architecture, infrastructure automation, IAM, secure access, monitoring and incident response." />
  <title>ED-OPS // Expertise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .domains-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .domain-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color var(--transition), transform var(--transition);
    }

    .domain-card:hover {
      border-color: var(--accent-cyan);
      transform: translateY(-2px);
    }

    .domain-card .dc-icon {
      font-size: 1.6rem;
      margin-bottom: 0.75rem;
      display: block;
    }

    .domain-card .dc-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .domain-card .dc-id {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .domain-card .dc-items {
      list-style: none;
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    .domain-card .dc-items li::before {
      content: '→ ';
      color: var(--accent-cyan);
    }

    /* Tools section */
    .tools-section {
      margin-top: 3rem;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    .tool-group {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .tool-group .tg-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent-green);
      margin-bottom: 0.5rem;
    }

    .tool-group .tg-items {
      font-size: 0.82rem;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .tool-group .tg-items span::before {
      content: '· ';
      color: var(--text-dim);
    }
  </style>
</head>
<body>
<script src="components/navbar.js"></script>

<main class="page-content" aria-label="Expertise page">
  <div class="container">
    <section class="section" aria-labelledby="expertise-heading">
      <header class="section-header">
        <p class="section-tag">// Domains of Operation</p>
        <h1 id="expertise-heading">Technical Expertise</h1>
        <p>Engineered capability domains — each built through hands-on lab work, production-equivalent configurations and continuous iteration.</p>
      </header>

      <div class="domains-grid" id="domains-grid" aria-label="Expertise domains"></div>
    </section>

    <div class="divider"></div>

    <section class="tools-section" aria-labelledby="tools-heading">
      <header class="section-header">
        <p class="section-tag">// Tooling &amp; Stack</p>
        <h2 id="tools-heading">Technologies &amp; Tools</h2>
      </header>
      <div class="tools-grid" id="tools-grid"></div>
    </section>
  </div>
</main>

<footer id="footer" role="contentinfo">
  <span>ED-OPS</span> // Elio Dages — Network &amp; Infrastructure Engineer
</footer>

<script>
  const DOMAIN_COLORS = {
    'network-architecture':       'var(--accent-green)',
    'infrastructure-automation':  'var(--accent-cyan)',
    'identity-access':            'var(--accent-orange)',
    'secure-remote-access':       'var(--accent-cyan)',
    'monitoring-observability':   'var(--accent-green)',
    'incident-response':          'var(--accent-red)',
  };

  fetch('data/skills.json')
    .then(r => r.json())
    .then(data => {
      /* ---- Domains ---- */
      const grid = document.getElementById('domains-grid');
      data.domains.forEach((d, i) => {
        const card = document.createElement('article');
        card.className = 'domain-card';
        card.setAttribute('aria-label', d.name);
        card.innerHTML = `
          <span class="dc-icon" aria-hidden="true">${d.icon}</span>
          <div class="dc-id">DOMAIN-${String(i + 1).padStart(2, '0')}</div>
          <div class="dc-name">${d.name}</div>
          <ul class="dc-items" aria-label="${d.name} capabilities">
            ${d.items.map(it => `<li>${it}</li>`).join('')}
          </ul>
        `;
        grid.appendChild(card);
      });

      /* ---- Tools ---- */
      const toolsGrid = document.getElementById('tools-grid');
      Object.entries(data.tools).forEach(([key, items]) => {
        const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const div = document.createElement('div');
        div.className = 'tool-group';
        div.innerHTML = `
          <div class="tg-label">${label}</div>
          <div class="tg-items">
            ${items.map(item => `<span>${item}</span>`).join('')}
          </div>
        `;
        toolsGrid.appendChild(div);
      });
    })
    .catch(() => {
      document.getElementById('domains-grid').innerHTML =
        '<p class="text-secondary">Could not load expertise data.</p>';
    });
</script>
</body>
</html>
