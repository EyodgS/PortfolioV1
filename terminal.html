<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ED-OPS interactive terminal. Type commands to explore Elio Dages' network engineering portfolio." />
  <title>ED-OPS // Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <script src="assets/js/i18n.js"></script>
  <style>
    .terminal-page {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 52px);
      padding: 1.5rem;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .terminal-header h1 {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .terminal-header h1 span { color: var(--accent-green); }

    .terminal-traffic-lights {
      display: flex;
      gap: 6px;
    }

    .terminal-traffic-lights span {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
    }

    .tl-red    { background: #ff5f57; }
    .tl-yellow { background: #febc2e; }
    .tl-green  { background: #28c840; }

    /* ---- Terminal widget ---- */
    .edops-terminal {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 480px;
      max-height: calc(100vh - 160px);
    }

    .terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      font-size: 0.82rem;
      line-height: 1.7;
    }

    .terminal-line {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .terminal-input-row {
      display: flex;
      align-items: center;
      padding: 0.6rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--bg-primary);
      gap: 0.4rem;
    }

    .terminal-prompt {
      font-size: 0.82rem;
      color: var(--accent-green);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      caret-color: var(--accent-green);
    }

    /* Token colours */
    .t-prompt { color: var(--accent-green); }
    .t-cmd    { color: var(--text-primary); }
    .t-green  { color: var(--accent-green); }
    .t-accent { color: var(--accent-cyan); }
    .t-dim    { color: var(--text-dim); }
    .t-error  { color: var(--accent-red); }

    .t-accent a { color: var(--accent-cyan); }

    @media (max-width: 600px) {
      .terminal-page { padding: 0.75rem; }
      .terminal-output { font-size: 0.75rem; }
      .terminal-input  { font-size: 0.75rem; }
      .terminal-prompt { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<script src="components/navbar.js"></script>

<main class="page-content terminal-page" aria-label="Interactive terminal">
  <header class="terminal-header">
    <div class="terminal-traffic-lights" aria-hidden="true">
      <span class="tl-red"></span>
      <span class="tl-yellow"></span>
      <span class="tl-green"></span>
    </div>
    <h1>ops@ed-ops: <span>~</span> — <span data-i18n="terminal.title">ED-OPS Terminal</span></h1>
  </header>

  <div id="terminal-mount"></div>
</main>

<script src="components/terminal.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const mount = document.getElementById('terminal-mount');
    new EDOpsTerminal(mount, { rootPath: './' });
  });
</script>
</body>
</html>
